name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (auto-detected from conventional commits if not set)
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push commits, create tags & GitHub releases
      id-token: write # npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required by changelogen to read all commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      # changelogen reads conventional commits, bumps package.json, writes CHANGELOG.md,
      # commits, tags, pushes, and creates the GitHub release — all in one step.
      - name: Bump version, generate changelog & create release
        run: |
          BUMP="${{ inputs.bump }}"
          if [ -n "$BUMP" ]; then
            npx changelogen@latest --$BUMP --push --release
          else
            npx changelogen@latest --bump --push --release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        # No token needed — OIDC trusted publishing handles auth automatically.
        # Provenance is also generated automatically; no --provenance flag required.
        run: npm publish --access public
